name: blog
description: "Blog Site"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0
  
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  equatable: ^2.0.8
  flutter_bloc: ^9.1.1
  provider: ^6.0.5
  auth0_flutter: ^2.0.0
  flutter_markdown_plus: ^1.0.7
  markdown: ^7.3.1
  flutter_inappwebview: ^6.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  fonts:
    - family: DataType
      fonts:
        - asset: assets/fonts/Datatype-Regular.ttf
        - asset: assets/fonts/Datatype-Bold.ttf
          weight: 700
